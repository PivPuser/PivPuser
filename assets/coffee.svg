  <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0 6; 0 -15" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0; 0.95; 0" keyTimes="0; 0.45; 1" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
</g>

<g opacity="0">
  <path d="M140 116 C 130 102, 150 94, 138 78 C 128 64, 146 56, 138 42" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0 6; 0 -14" dur="4.5s" begin="3s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0; 0.9; 0" keyTimes="0; 0.45; 1" dur="4.5s" begin="3s" repeatCount="indefinite"/>
</g>
</svg>
