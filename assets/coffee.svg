<svg viewBox="0 0 240 250" width="240" height="250" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl dsc">
<title id="ttl">Solid white coffee cup with brown coffee</title>
<desc id="dsc">A minimalist solid white coffee cup with a brown coffee surface and three white steam wisps rising one after another.</desc>

<path d="M198 148 C 236 150, 236 186, 188 188" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>

<path d="M38 120 C 44 178, 72 224, 120 224 C 168 224, 196 178, 202 120 Z" fill="#ffffff"/>
<ellipse cx="120" cy="120" rx="82" ry="18" fill="#ffffff"/>
<ellipse cx="120" cy="120" rx="72" ry="13" fill="#6F4E37"/>

<g opacity="0">
  <path d="M100 116 C 90 102, 110 94, 98 78 C 88 64, 106 56, 98 42" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0 6; 0 -14" dur="4.5s" begin="0s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0; 0.9; 0" keyTimes="0; 0.45; 1" dur="4.5s" begin="0s" repeatCount="indefinite"/>
</g>

<g opacity="0">
