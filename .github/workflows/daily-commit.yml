name: daily commit

on:
  schedule:
    - cron: "23 8 * * *"   # every day ~08:23 UTC (off-peak, mid-day)
  workflow_dispatch:        # allow manual run

permissions:
  contents: write

concurrency:
  group: daily-commit
  cancel-in-progress: false

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: make the daily activity commit
        run: |
          git config user.name "PivPuser"
          git config user.email "258039196+PivPuser@users.noreply.github.com"
          mkdir -p .activity
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .activity/last-run
          git add .activity/last-run
          git commit -m "chore: keep the streak alive ($(date -u +%Y-%m-%d))" || { echo "nothing to commit"; exit 0; }
          git push
